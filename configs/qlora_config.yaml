model_name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"

training:
  epochs: 3
  learning_rate: 0.0002
  batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  max_seq_length: 512

qlora:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"
  use_nested_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

output:
  output_dir: "outputs"
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
